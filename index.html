<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/particles/shrek.png">
    <title>Shrek's Garden</title>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
                "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
                "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.21.0/dist/lil-gui.esm.min.js",
                "stats.js": "https://cdn.jsdelivr.net/npm/stats.js@0.17.0/src/Stats.js",
                "simplex-noise": "https://cdn.jsdelivr.net/npm/simplex-noise@4.0.3/+esm"
            }
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style/style.css">
</head>

<body>

    <!-- Loading screen (visible jusqu'à ce que tous les assets soient chargés) -->
    <div id="loading-wrapper">
        <div id="loading-content"></div>
        <div id="loading-text">
            <span id="loading-title">SHREK'S GARDEN</span>
            <span id="loading-sub">Chargement…</span>
        </div>
    </div>

    <div id="ThreeJS" style="position: absolute; left:0px; top:0px"></div>

    <button id="settings-btn" aria-label="Paramètres">
        <img src="assets/setting.png" alt="">
    </button>

    <div id="controls-popup">
        <button id="close-btn" aria-label="Fermer">&times;</button>
        <h2>Commandes</h2>
        <div class="control-row">
            <span class="control-label">Avancer</span>
            <span class="key-box">Z</span>
        </div>
        <div class="control-row">
            <span class="control-label">Reculer</span>
            <span class="key-box">S</span>
        </div>
        <div class="control-row">
            <span class="control-label">Tourner à gauche</span>
            <span class="key-box">Q</span>
        </div>
        <div class="control-row">
            <span class="control-label">Tourner à droite</span>
            <span class="key-box">D</span>
        </div>
        <div class="control-row">
            <span class="control-label">Courir</span>
            <span class="key-box">Shift</span>
        </div>
        <hr class="popup-divider">
        <div class="control-row">
            <span class="control-label">Qualité rendu</span>
            <span class="key-box" id="pixel-ratio-display">1.0×</span>
        </div>
        <input type="range" id="pixel-ratio-slider" min="0.5" max="3" step="0.25">

        <div class="start-hint">Appuyez sur la croix pour commencer l'aventure</div>
    </div>

    <script type="module" src="main.js"></script>

    <script>
        document.getElementById('close-btn').addEventListener('click', () => {
            const popup = document.getElementById('controls-popup');
            popup.classList.add('hidden');
            setTimeout(() => { popup.style.display = 'none'; }, 400);
        });

        document.getElementById('settings-btn').addEventListener('click', () => {
            const popup = document.getElementById('controls-popup');
            popup.style.display = 'flex';
            requestAnimationFrame(() => popup.classList.remove('hidden'));
        });
    </script>
</body>

</html>
